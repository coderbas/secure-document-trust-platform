{% extends "base.html" %}

{% block content %}

<div class="panel">
    <p class="panel-eyebrow">Operation 03</p>
    <h2 class="panel-title">Encrypt a document</h2>
    <p class="panel-desc">Upload a file to seal it with AES-256-GCM. A fresh random nonce is generated for this
        operation and stored with the ciphertext.</p>

    <form action="/encrypt" method="POST" enctype="multipart/form-data">
        <div class="field">
            <label for="encrypt-document">Document</label>
            <input type="file" id="encrypt-document" name="document" required>
        </div>
        <button class="btn btn-primary" type="submit">Encrypt document</button>
    </form>
</div>

<a href="/" class="back-link">&larr; Back home</a>

{% endblock %}
