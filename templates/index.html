<!DOCTYPE html>
<html>

<head>
    <title>Secure Document Trust Platform</title>
</head>

<body>

    <h1>Secure Document Trust Platform</h1>

    <p>
        Upload a document to sign, verify,
        encrypt, or decrypt.
    </p>

    <hr>

    <h2>Upload Document</h2>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input type="file" name="document" required>

        <br><br>

        <button type="submit">
            Upload
        </button>

    </form>

</body>

</html>
